services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-motusroyale}
      POSTGRES_USER: ${POSTGRES_USER:-motus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-16379}:6379"
    volumes:
      - redis-data:/data

  game:
    build:
      context: .
      dockerfile: apps/game/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000},http://caddy
      AUTH_VERIFY_URL: http://web:3000/api/auth/one-time-token/verify
      GAME_PUBLIC_WS_URL: ${NEXT_PUBLIC_GAME_WS_URL:-ws://localhost:2567}
      GAME_PUBLIC_HTTP_URL: http://game:2567
      GAME_TOKEN_SECRET: ${GAME_TOKEN_SECRET:?Set GAME_TOKEN_SECRET in .env}
      GAME_SERVICE_KEY: ${GAME_SERVICE_KEY:?Set GAME_SERVICE_KEY in .env}
    depends_on:
      - postgres
      - redis
    ports:
      - "127.0.0.1:${GAME_HOST_PORT:-2567}:2567"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        AUTH_BASE_URL: ${AUTH_BASE_URL:-http://localhost:3000/api/auth}
        NEXT_PUBLIC_GAME_WS_URL: ${NEXT_PUBLIC_GAME_WS_URL:-ws://localhost:2567}
        PASSKEY_RP_ID: ${PASSKEY_RP_ID:-localhost}
        PASSKEY_ORIGIN: ${PASSKEY_ORIGIN:-http://localhost:3000}
        PASSKEY_ORIGINS: ${PASSKEY_ORIGINS:-}
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      AUTH_BASE_URL: ${AUTH_BASE_URL:-http://localhost:3000/api/auth}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      GAME_SERVER_INTERNAL_URL: http://game:2567
      NEXT_PUBLIC_GAME_WS_URL: ${NEXT_PUBLIC_GAME_WS_URL:-ws://localhost:2567}
      GAME_SERVICE_KEY: ${GAME_SERVICE_KEY:?Set GAME_SERVICE_KEY in .env}
      PASSKEY_RP_ID: ${PASSKEY_RP_ID:-localhost}
      PASSKEY_ORIGIN: ${PASSKEY_ORIGIN:-http://localhost:3000}
      PASSKEY_ORIGINS: ${PASSKEY_ORIGINS:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
    depends_on:
      - postgres
      - game
    ports:
      - "127.0.0.1:${WEB_HOST_PORT:-3000}:3000"

  caddy:
    image: caddy:2.10-alpine
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN:-local.motus.test}
    depends_on:
      - web
      - game
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro

  cloudflared:
    image: cloudflare/cloudflared:2025.8.1
    profiles: ["preview"]
    depends_on:
      - caddy
    command: tunnel --config /etc/cloudflared/config.yml run
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN:-local.motus.test}
      CLOUDFLARED_TUNNEL_ID: ${CLOUDFLARED_TUNNEL_ID:-replace-with-your-tunnel-id}
    volumes:
      - ./infra/cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ${CLOUDFLARED_CREDENTIALS_FILE:-./infra/cloudflared/creds.placeholder.json}:/etc/cloudflared/creds.json:ro

  lgtm:
    image: grafana/otel-lgtm:0.11.7
    profiles: ["obs"]
    ports:
      - "3001:3000"
      - "4317:4317"
      - "4318:4318"

volumes:
  postgres-data:
  redis-data:
