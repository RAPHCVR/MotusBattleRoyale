apiVersion: v1
kind: ConfigMap
metadata:
  name: motus-runtime
data:
  NODE_ENV: production
  AUTH_STORAGE_MODE: postgres
  LOG_LEVEL: info
  POSTGRES_DB: motusroyale
  POSTGRES_USER: motus
  REDIS_URL: redis://redis:6379
  NEXT_PUBLIC_APP_URL: https://play.example.com
  AUTH_BASE_URL: https://play.example.com/api/auth
  GAME_SERVER_INTERNAL_URL: http://game:2567
  NEXT_PUBLIC_GAME_WS_URL: wss://rt.example.com
  GAME_PUBLIC_WS_URL: wss://rt.example.com
  GAME_PUBLIC_HTTP_URL: https://rt.example.com
  AUTH_VERIFY_URL: http://web:3000/api/auth/one-time-token/verify
  PASSKEY_RP_ID: play.example.com
  PASSKEY_ORIGIN: https://play.example.com
  CORS_ORIGIN: https://play.example.com
