apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: motus-play
  labels:
    app.kubernetes.io/component: ingress-play
spec:
  ingressClassName: nginx
  rules:
    - host: play.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: motus-rt
  labels:
    app.kubernetes.io/component: ingress-rt
spec:
  ingressClassName: nginx
  rules:
    - host: rt.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: game
                port:
                  name: http
